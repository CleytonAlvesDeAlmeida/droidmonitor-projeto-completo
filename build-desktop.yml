name: Build Desktop Server (Linux + Windows)

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/build-desktop.yml"
  workflow_dispatch: {}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: droidmonitor-server-linux
          - os: windows-latest
            artifact_name: droidmonitor-server-windows

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # aiortc precisa de headers de dev do ffmpeg/opus/vpx para compilar
      # o pacote "av" a partir do código-fonte quando não há wheel pronta.
      # No runner Windows, o setup-python já baixa uma wheel pronta do PyPI
      # para 3.11, então este passo é pulado lá.
      - name: Instalar dependências de sistema (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-tk \
            libavdevice-dev libavfilter-dev libavformat-dev libavcodec-dev \
            libswresample-dev libswscale-dev libavutil-dev \
            libopus-dev libvpx-dev pkg-config

      - name: Instalar dependências Python
        working-directory: server
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build do executável
        working-directory: server
        run: pyinstaller droidmonitor.spec --clean --noconfirm

      - name: Upload do artefato
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            server/dist/DroidMonitor-Server
            server/dist/DroidMonitor-Server.exe
          if-no-files-found: ignore
