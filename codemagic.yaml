workflows:
  android-release:
    name: Build Android APK
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: Entrar na pasta e pegar dependências
        script: |
          cd Android
          flutter pub get
      - name: Build APK
        script: |
          cd Android
          flutter build apk --release
    artifacts:
      - Android/build/app/outputs/flutter-apk/app-release.apk